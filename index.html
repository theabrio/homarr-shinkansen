<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NHK Ticker</title>
<style>
  /* Forces the canvas to fill the entire Homarr tile */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }
  
  body { 
    background-color: #ffffff; /* Pure white background */
    color: #1217A6;            /* Your custom deep blue text */
    font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; 
    overflow: hidden; 
    display: flex; 
    align-items: center;       /* Perfectly centers the text vertically */
  }
  .ticker-container { 
    width: 100%; 
    overflow: hidden; 
    white-space: nowrap; 
  }
  .ticker-text { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 120s linear infinite; 
    font-size: 1.2rem; 
    font-weight: bold;
    letter-spacing: 2px; 
  }
  
  .ticker-text:hover {
    animation-play-state: paused;
  }

  .ticker-text span {
    margin-right: 80px; /* Wide spacing to separate the headlines cleanly */
  }
  @keyframes ticker { 
    0% { transform: translateX(0); } 
    100% { transform: translateX(-100%); } 
  }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="ticker-text" id="ticker">最新のニュースを取得中...</div>
</div>

<script>
  // NHK Major News (主要ニュース) feed
  const rssUrl = 'https://www.nhk.or.jp/rss/news/cat0.xml';
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  
  fetch(apiUrl)
    .then(res => res.json())
    .then(data => {
      if (data.status === 'ok' && data.items.length > 0) {
        // Pure headlines, no brackets
        const headlines = data.items.map(item => `<span>${item.title}</span>`).join('');
        document.getElementById("ticker").innerHTML = headlines;
      } else {
        document.getElementById("ticker").innerHTML = "ニュースフィードが空です。";
      }
    })
    .catch(() => {
      document.getElementById("ticker").innerHTML = "ニュースの読み込みに失敗しました。";
    });
</script>

</body>
</html>
